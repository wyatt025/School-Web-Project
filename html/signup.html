<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/signup.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Signup</title>
</head>

<body class="d-flex align-items-center justify-content-center vh-100 bg-v bg-dark text-white">

 <div class="container-fluid page-wrapper d-flex align-items-center">
    <div class="row w-100">

      <div class="col-md-6 d-flex flex-column justify-content-center ps-5">
        <div class="brand">
          <h1>Vidzä</h1>
          <p>Join us</p>
        </div>
      </div>

      <div class="col-md-6 d-flex justify-content-center">
        <div class="form-card">

          <input class="form-control mb-3" placeholder="First name">
          <input class="form-control mb-3" placeholder="Last name">

          <div class="row mb-3">
            <div class="col">
              <input class="form-control" placeholder="Month">
            </div>
            <div class="col">
              <input class="form-control" placeholder="Day">
            </div>
            <div class="col">
              <input class="form-control" placeholder="Year">
            </div>
          </div>

          <input class="form-control mb-3" placeholder="Gender">
          <input class="form-control mb-4" placeholder="Email or phone">

          <button class="btn btn-main"  >Register</button>

        </div>
      </div>

    </div>
  </div>
<script src="../../js/signup.js"></script>
</body>
</html>
