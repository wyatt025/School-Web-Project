<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/signup.css">
    <title>Signup</title>
</head>

<body class="bg-dark text-white">

 <div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100" style="max-width: 900px;">

      <div class="col-md-6 d-flex flex-column justify-content-center">
        <button onclick="onBackClick()" class="btn btn-secondary w-25 rounded-pill mb-3">Back</button>
        <a href="../html/mainPage.html">
           <img src="../assets/vidzä_logo.png" alt="Vidzä Logo">
        </a>
        <p class="signup-text fs-4">Join us</p>
      </div>

      <div class="col-md-6">
        <div class="p-4 bg-black rounded">
          <input class="form-control mb-3" placeholder="First name">
          <input class="form-control mb-3" placeholder="Last name">

          <div class="row mb-3">
            <div class="col">
              <input class="form-control" placeholder="Month">
            </div>
            <div class="col">
              <input class="form-control" placeholder="Day">
            </div>
            <div class="col">
              <input class="form-control" placeholder="Year">
            </div>
          </div>

          <input class="form-control mb-3" placeholder="Gender">
          <input class="form-control mb-4" placeholder="Email or phone">
          <button class="btn btn-secondary w-100 rounded-pill mb-3">Register</button>
        </div>
      </div>
    </div>
  </div>
  <script src="../../js/signup.js"></script>
</body>
</html>
