<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/signup.css">
    <title>Signup</title>
</head>

<body class="bg-dark text-white">

 <div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100" style="max-width: 900px;">

      <div class="col-md-6 d-flex flex-column justify-content-center">
        <button onclick="openLoginPage()" class="btn btn-secondary w-25 rounded-pill mb-3">Back</button>
        <a href="../html/mainPage.html">
           <img src="../assets/vidzä_logo.png" alt="Vidzä Logo">
        </a>
        <p class="signup-text fs-4">Join us</p>
      </div>

      <div class="col-md-6">
        <div class="p-4 bg-black rounded">
          <form id="signupForm">
            <input id="firstName" class="form-control mb-3" placeholder="First name">
            <input id="lastName" class="form-control mb-3" placeholder="Last name">
            <input id="dob" class="form-control mb-3" type="date">
            
            <select class="form-control mb-3" id ="gender">
              <option value="">--Select Gender--</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="prefer not to say">Prefer not to say</option>
            </select>
          
            <input id="email" class="form-control mb-4" placeholder="Email">
            <input id="password" class="form-control mb-4" type="password" placeholder="Password">
            <button type="submit" class="btn btn-secondary w-100 rounded-pill mb-3">Register</button>
          </form>
          
        </div>
      </div>
    </div>
  </div>
  <script src="../../js/signup.js"></script>
</body>
</html>
