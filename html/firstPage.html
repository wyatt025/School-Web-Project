<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Profile Selection</title>
    <link rel="stylesheet" href="../css/firstPage.css">
</head>
<body>
    <div class="profile-container">
        <img src="YouTube-Logosu.png" class="header-logo">
        <h1>Who's watching?</h1>
        <div class="profile-list">
            <a href="mainPage.html">
                <div class="profile">
                    <div class="avatar" style="background-color: #00a8e1;">
                        <img src="YouTube-Logosu.png" alt="Profile 1" style="width: 100px; height: 100px;">
                    </div>
                    <span class="profile-name">User</span>
                </div>
            </a>

            <div class="profile">
                <div class="avatar kids">
                    <span class="kids-text">Kids</span>
                </div>
                <span class="profile-name">Kids</span>
            </div>

            <div class="profile">
                <div class="avatar add-profile">
                    <span class="plus-icon">+</span>
                </div>
                <span class="profile-name">Add Profile</span>
            </div>
        </div>

        <button class="manage-btn">Manage Profiles</button>
    </div>
</body>
</html>
