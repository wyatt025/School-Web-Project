<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Info - Google Account Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../css/profilePage.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
  <header class="header">
        <div class="header-left">
            <div class="logo-container">
                <a href="mainPage.html"><img src="../assets/vidzä_logo.png" alt="Vidzä Logo" class="vidzä-logo"></a>
            </div>
            <div class="location">
                <i class="fa-solid fa-location-dot" ></i>
                <p class="location-name">Finland</p>
            </div>

        </div>

        <div class="header-center">
            <div class="search-container">
                <input type="text" placeholder="Search" class="search-input">
                <button class="search-btn">🔍</button>
            </div>
            <button class="mic-btn">🎙️</button>
        </div>

        <div class="header-right">
            <button class="icon-btn notification-btn">
                🔔 <span class="badge">8+</span>
            </button>
            <button  id="profileIcon" class="user-avatar" onclick="openProfileMenu()"> 
                <img src="\assets\profile.png" class="user-pic">
            </button>

            <div id="profileMenu" class="profile-menu">
                <div class="user-info">
                    <img src="\assets\profile.png">
                    <p id="userEmail">John Doe</p>
                </div>
                <hr>
                <a href="../html/profilePage.html" class="sub-menu-link">
                    <img src="\assets\vidzä_logo.png">
                    <p>My Vidzä account</p>
                </a>
                <a href="#" class="sub-menu-link">
                    <img src="\assets\upload.png">
                    <p>Upload video</p>
                </a>
                <a href="#" class="sub-menu-link" onclick="signout()">
                    <img src="\assets\logout.png">
                    <p>Sign out</p>
                </a>
            </div>
        </div>
        <nav class="sidebar">
            <div class="nav-item menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </div>
            <a href="mainPage.html" class="nav-item active">
                <i class="fa-solid fa-house"></i>
                <span>Home</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-music"></i>
                <span>Music</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-fire"></i>        
                <span>Trending</span>
            </a>
            <a href="#" class="nav-item you-section">
                <i class="fa-solid fa-circle-user"></i>
                <span>You</span>
            </a>
    
        </nav>
    </header>
    <div class="app-container">

        <main class="content">
            <h1>Upload your video</h1>
            <div id="button-container">
                <button id="edit-btn">Input</button>
            </div>
            <div class="info-card">
                <!-- Info Row: Thumbnail -->
                <div class="info-row">
                    <div class="label-group">
                        <span class="icon">📷</span>
                        <div class="text">
                            <h3>Thumbnail</h3>
                            <p>A thumbnail helps visualize your video</p>
                        </div>
                    </div>
                    <div class="val-display" id="thumbnail-container">
                        <input type="file" id="thumbnail-input" accept="image/jpeg, image/png">
                    </div>
                </div>

                <!-- Info Row: Video File -->
                <div class="info-row">
                    <div class="label-group">
                        <span class="icon">📷</span>
                        <div class="text">
                            <h3>Video File</h3>
                            <p>Upload your video file here</p> 
                            <br><span class="text-muted">Supported formats: .mp4</span></div> 
                        </div>
                    </div>
                    <div class="val-display" id="video-file-container">
                        <input type="file" id="video-file-input" accept="video/mp4">
                    </div>
                </div>

                <!-- Info Row: Video Title -->
                <div class="info-row">
                    <div class="label-group">
                        <span class="icon">>Title</span>
                        <div class="text">
                            <h3>Video Title</h3>
                        </div>
                    </div>
                    <div class="val-display" id="video-title">
                        <input type="text" id="video-title-input" placeholder="Enter video title">
                    </div>
                </div>

                <!-- Info Row: Video Description -->
                <div class="info-row">
                    <div class="label-group">
                        <span class="icon">�</span>
                        <div class="text">
                            <h3>Video Description</h3>
                        </div>
                    </div>
                    <div class="val-display" id="video-description">
                        <textarea id="video-description-input" placeholder="Enter video description"></textarea>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/auth.js"></script>
    <script src="../js/profilePage.js"></script>
    <script>loadUserInfo();</script>
</body>
</html>
