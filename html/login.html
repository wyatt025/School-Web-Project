<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/login.css">
    <title>Login page</title>
</head>
<body class="bg-dark text-white">
    <div class="container vh-100 d-flex align-items-center justify-content-center">
    <div class="row w-100" style="max-width: 900px;">
      <div class="col-md-6 d-flex flex-column justify-content-center">
       <a href="../html/mainPage.html">
          <img src="../assets/vidzä_logo.png" alt="Vidzä Logo">
        </a>
        <p class="login-text fs-4">Login</p>
      </div>

      <div class="col-md-6">
        <div class="p-4 bg-black rounded">
          <input class="form-control mb-3" type="text" placeholder="Enter email or phone">
          <input class="form-control mb-3" type="password" placeholder="Enter password">

          <button class="btn btn-secondary w-100 rounded-pill mb-3">Login</button>
          
          <p class="text-center small">Not registered?</p>

          <button onclick="openSignUpPage()" class="btn btn-light w-100 rounded-pill">
            Create an account
          </button>
        </div>
      </div>
    </div>
  </div>
    <script src="../../js/login.js"></script>
</body>
</html>
