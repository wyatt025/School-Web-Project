<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="CSS/webProjectStyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Document</title>
</head>
<body>
    <header>
        <div id="header_bar">
            <img src="YouTube-Logosu.png" alt="logo" id="logo">
            <div class="location">
                <i class="fa-solid fa-location-dot" style="background-color: red;"></i>
                <p class="location-name">Finland</p>
            </div>
            <div class="nav-search">
                <input placeholder="   Search Youtube" class="search-input">
                <div class="search-icon">
                    <i class="fa-solid fa-magnifying-glass" class="search-icon"></i>
                </div>
            </div>
            <div>
                <i class="fa-solid fa-bell" id="noti-icon"></i>
            </div>
            <div class="create-icon">
                <p class="plus-icon"><b class="plus-icon">+</b></p>
                <p class="create-write">Create</p>
            </div>
            <div class="signin" style="border-radius: 15%;">
                <i class="fa-solid fa-user" style="background-color: red; margin-left: 7px;" class="user-icon"></i>
                <p class="signin-para">Hello 😀,
                    Wanna sign in ?
                </p>
            </div>
            
            
        </div>
    </header>
    <script src="frontEndJS/index.jS"></script>
</body>
</html>
