<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Header Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="CSS/webProjectStyle.css">
</head>
<body>

    <!-- Header Section -->
    <header class="header">
        <!-- Left: Menu & Logo -->
        <div class="header-left">
            <div class="logo-container">
                <img src="YouTube-Logosu.png" alt="YouTube Logo" class="yt-logo">
            </div>
            <div class="location">
                <i class="fa-solid fa-location-dot" ></i>
                <p class="location-name">Finland</p>
            </div>

        </div>

        <!-- Center: Search Bar -->
        <div class="header-center">
            <div class="search-container">
                <input type="text" placeholder="Search" class="search-input">
                <button class="search-btn">🔍</button>
            </div>
            <button class="mic-btn">🎙️</button>
        </div>

        <!-- Right: User Actions -->
        <div class="header-right">
            <button class="icon-btn notification-btn">
                🔔 <span class="badge">9+</span>
            </button>
            <div class="user-avatar"></div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="video-section">
        <!-- Colorful placeholder boxes -->
        <div class="video-grid">
            <div class="video-box" style="background-color: #ff5733;"></div>
            <div class="video-box" style="background-color: #33ff57;"></div>
            <div class="video-box" style="background-color: #3357ff;"></div>
            <div class="video-box" style="background-color: #f333ff;"></div>
            <div class="video-box" style="background-color: #ffbd33;"></div>
            <div class="video-box" style="background-color: #33fff3;"></div>
        </div>
    </main>

</body>
</html>
